# Test fixture for js/command-injection rule.
rule: js/command-injection
samples:
  - name: positive_req_body_to_exec
    language: javascript
    code: |
      const cmd = req.body.command;
      child_process.exec(cmd);  // ruleid: js/command-injection

  - name: positive_req_query_to_execSync
    language: javascript
    code: |
      const userCmd = req.query.cmd;
      execSync(userCmd);  // ruleid: js/command-injection

  - name: negative_sanitized_with_shell
    language: javascript
    code: |
      const cmd = req.body.command;
      const safe = shell.escape(cmd);
      child_process.exec(safe);  // ok

  - name: negative_static_command
    language: javascript
    code: |
      child_process.exec("ls -la");  // ok
