# Test fixture for py/xss-template rule.
rule: py/xss-template
samples:
  - name: positive_flask_args_to_mark_safe
    language: python
    code: |
      user_input = flask.request.args.get('comment')
      html = mark_safe(user_input)  # ruleid: py/xss-template

  - name: positive_flask_form_to_render_template_string
    language: python
    code: |
      name = flask.request.form.get('name')
      render_template_string("<h1>" + name + "</h1>")  # ruleid: py/xss-template

  - name: negative_sanitized_with_escape
    language: python
    code: |
      user_input = flask.request.args.get('comment')
      safe = escape(user_input)
      html = mark_safe(safe)  # ok

  - name: negative_static_template
    language: python
    code: |
      render_template_string("<h1>Hello World</h1>")  # ok
