# Test fixture for js/path-traversal rule.
rule: js/path-traversal
samples:
  - name: positive_req_query_to_readFileSync
    language: javascript
    code: |
      const filename = req.query.file;
      const data = fs.readFileSync(filename);  // ruleid: js/path-traversal

  - name: positive_req_params_to_readFile
    language: javascript
    code: |
      const path = req.params.path;
      fs.readFile(path, 'utf8', callback);  // ruleid: js/path-traversal

  - name: negative_sanitized_with_path_resolve
    language: javascript
    code: |
      const filename = req.query.file;
      const safe = path.resolve(filename);
      const data = fs.readFileSync(safe);  // ok

  - name: negative_static_path
    language: javascript
    code: |
      const data = fs.readFileSync("/etc/hostname");  // ok
