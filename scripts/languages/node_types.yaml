    - type_identifier

# ─── C++ (issue #198) ───────────────────────────────────────────────
cpp:
  function_def:
    - function_definition
  class_def:
    - class_specifier
    - struct_specifier
    - union_specifier
    - enum_specifier
  import:
    - preproc_include
    - using_declaration
  call:
    - call_expression
  namespace:
    - namespace_definition
  template:
    - template_declaration
  type_alias:
    - type_alias_declaration
    - type_definition
  identifier:
    - identifier
    - field_identifier
    - type_identifier
    - qualified_identifier
    - scoped_identifier
